<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lingo — Language Translator</title>
<style>
  :root{
    --ink:#1f2421;
    --paper:#f6f3ec;
    --paper-2:#eee9dd;
    --rule:#d8d2c2;
    --moss:#3e5c4f;
    --moss-dark:#2c4338;
    --clay:#b3592f;
    --clay-light:#e7c9b8;
    --muted:#7c7768;
    --white:#fffdf8;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Iowan Old Style', 'Palatino Linotype', Georgia, serif;
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:48px 20px;
  }

  .sheet{
    width:100%;
    max-width:880px;
    background:var(--white);
    border:1px solid var(--rule);
    box-shadow:0 1px 0 var(--rule), 0 18px 40px -28px rgba(31,36,33,0.35);
  }

  .masthead{
    padding:30px 36px 22px;
    border-bottom:3px double var(--ink);
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }

  .masthead h1{
    margin:0;
    font-size:34px;
    letter-spacing:0.5px;
    font-weight:700;
  }
  .masthead h1 span{
    color:var(--clay);
    font-style:italic;
  }

  .masthead .kicker{
    font-family:'Courier New', monospace;
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--muted);
  }

  .controls{
    display:grid;
    grid-template-columns:1fr 56px 1fr;
    align-items:center;
    gap:14px;
    padding:24px 36px 4px;
  }

  .lang-field label{
    display:block;
    font-family:'Courier New', monospace;
    font-size:10.5px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:6px;
  }

  select{
    width:100%;
    appearance:none;
    background:var(--paper-2);
    border:1px solid var(--rule);
    border-radius:2px;
    padding:11px 14px;
    font-family:inherit;
    font-size:15px;
    color:var(--ink);
    cursor:pointer;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%237c7768' stroke-width='1.6' fill='none' fill-rule='evenodd'/></svg>");
    background-repeat:no-repeat;
    background-position:right 14px center;
  }
  select:focus{ outline:2px solid var(--moss); outline-offset:1px; }

  .swap-btn{
    width:42px;
    height:42px;
    margin-top:18px;
    border-radius:50%;
    border:1px solid var(--rule);
    background:var(--white);
    color:var(--moss-dark);
    font-size:18px;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform .25s ease, background .2s ease;
  }
  .swap-btn:hover{ background:var(--clay-light); transform:rotate(180deg); }
  .swap-btn:focus-visible{ outline:2px solid var(--moss); outline-offset:2px; }

  .panes{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:0;
    border-top:1px solid var(--rule);
    margin-top:22px;
  }

  .pane{
    padding:22px 36px 26px;
    position:relative;
  }
  .pane.source{ border-right:1px dashed var(--rule); }

  .pane-label{
    font-family:'Courier New', monospace;
    font-size:10.5px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
  }

  textarea{
    width:100%;
    min-height:170px;
    resize:vertical;
    border:none;
    background:transparent;
    font-family:inherit;
    font-size:18px;
    line-height:1.55;
    color:var(--ink);
    padding:0;
  }
  textarea:focus{ outline:none; }
  textarea::placeholder{ color:#b9b4a4; font-style:italic; }

  .output-text{
    min-height:170px;
    font-size:18px;
    line-height:1.55;
    white-space:pre-wrap;
    word-break:break-word;
  }
  .output-text.placeholder{ color:#b9b4a4; font-style:italic; }

  .char-count{
    font-family:'Courier New', monospace;
    color:var(--muted);
    text-transform:none;
    letter-spacing:0;
  }

  .toolbar{
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 36px 28px;
    flex-wrap:wrap;
  }

  .translate-btn{
    background:var(--moss);
    color:var(--white);
    border:none;
    padding:13px 30px;
    font-family:inherit;
    font-size:16px;
    letter-spacing:0.5px;
    border-radius:3px;
    cursor:pointer;
    transition:background .2s ease, transform .1s ease;
  }
  .translate-btn:hover{ background:var(--moss-dark); }
  .translate-btn:active{ transform:translateY(1px); }
  .translate-btn:disabled{ background:#a9a293; cursor:wait; }
  .translate-btn:focus-visible{ outline:2px solid var(--clay); outline-offset:2px; }

  .icon-btn{
    background:none;
    border:1px solid var(--rule);
    color:var(--moss-dark);
    padding:11px 16px;
    font-family:inherit;
    font-size:14px;
    border-radius:3px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:7px;
    transition:background .2s ease, border-color .2s ease;
  }
  .icon-btn:hover{ background:var(--paper-2); border-color:var(--moss); }
  .icon-btn:disabled{ opacity:0.4; cursor:not-allowed; }
  .icon-btn:focus-visible{ outline:2px solid var(--moss); outline-offset:2px; }

  .status-line{
    font-family:'Courier New', monospace;
    font-size:12.5px;
    color:var(--muted);
    margin-left:auto;
    min-height:16px;
  }
  .status-line.error{ color:var(--clay); }

  .footer-rule{
    border-top:3px double var(--ink);
    padding:14px 36px;
    font-family:'Courier New', monospace;
    font-size:10.5px;
    letter-spacing:1px;
    color:var(--muted);
    text-transform:uppercase;
    text-align:center;
  }

  @media (max-width: 680px){
    .panes{ grid-template-columns:1fr; }
    .pane.source{ border-right:none; border-bottom:1px dashed var(--rule); }
    .controls{ grid-template-columns:1fr 40px 1fr; padding:20px 20px 0; }
    .masthead, .toolbar{ padding-left:20px; padding-right:20px; }
    .pane{ padding:18px 20px 22px; }
    .swap-btn{ width:36px; height:36px; margin-top:16px; font-size:15px; }
  }
</style>
</head>
<body>

<div class="sheet">

  <div class="masthead">
    <h1>Lingo<span>.</span></h1>
    <div class="kicker">Plain-text translation, no fuss</div>
  </div>

  <div class="controls">
    <div class="lang-field">
      <label for="sourceLang">Translate from</label>
      <select id="sourceLang"></select>
    </div>

    <button class="swap-btn" id="swapBtn" title="Swap languages" aria-label="Swap source and target languages">⇄</button>

    <div class="lang-field">
      <label for="targetLang">Translate into</label>
      <select id="targetLang"></select>
    </div>
  </div>

  <div class="panes">
    <div class="pane source">
      <div class="pane-label">
        <span>Source text</span>
        <span class="char-count"><span id="charCount">0</span>/500</span>
      </div>
      <textarea id="sourceText" maxlength="500" placeholder="Type or paste the text you want translated…"></textarea>
    </div>

    <div class="pane">
      <div class="pane-label">
        <span>Translation</span>
      </div>
      <div class="output-text placeholder" id="outputText" aria-live="polite">Your translation will appear here.</div>
    </div>
  </div>

  <div class="toolbar">
    <button class="translate-btn" id="translateBtn">Translate</button>
    <button class="icon-btn" id="copyBtn" disabled>⧉ Copy</button>
    <button class="icon-btn" id="speakBtn" disabled>♪ Listen</button>
    <span class="status-line" id="statusLine"></span>
  </div>

  <div class="footer-rule">Powered by the MyMemory Translation API · Free, no key required</div>

</div>

<script>
  // A solid, broadly-supported set of languages (ISO 639-1 codes used by MyMemory)
  const LANGUAGES = [
    ["en","English"], ["es","Spanish"], ["fr","French"], ["de","German"],
    ["it","Italian"], ["pt","Portuguese"], ["nl","Dutch"], ["ru","Russian"],
    ["zh","Chinese (Simplified)"], ["ja","Japanese"], ["ko","Korean"],
    ["ar","Arabic"], ["hi","Hindi"], ["ta","Tamil"], ["te","Telugu"],
    ["kn","Kannada"], ["ml","Malayalam"], ["mr","Marathi"], ["bn","Bengali"],
    ["gu","Gujarati"], ["pa","Punjabi"], ["ur","Urdu"], ["tr","Turkish"],
    ["vi","Vietnamese"], ["th","Thai"], ["id","Indonesian"], ["pl","Polish"],
    ["sv","Swedish"], ["el","Greek"], ["he","Hebrew"], ["uk","Ukrainian"],
    ["fa","Persian"], ["ro","Romanian"], ["cs","Czech"], ["fi","Finnish"],
    ["da","Danish"], ["no","Norwegian"], ["hu","Hungarian"], ["sw","Swahili"]
  ];

  const sourceLangSel = document.getElementById('sourceLang');
  const targetLangSel = document.getElementById('targetLang');
  const sourceText = document.getElementById('sourceText');
  const outputText = document.getElementById('outputText');
  const translateBtn = document.getElementById('translateBtn');
  const copyBtn = document.getElementById('copyBtn');
  const speakBtn = document.getElementById('speakBtn');
  const statusLine = document.getElementById('statusLine');
  const charCount = document.getElementById('charCount');
  const swapBtn = document.getElementById('swapBtn');

  function populateSelect(select, defaultCode){
    LANGUAGES.forEach(([code, name]) => {
      const opt = document.createElement('option');
      opt.value = code;
      opt.textContent = name;
      if(code === defaultCode) opt.selected = true;
      select.appendChild(opt);
    });
  }
  populateSelect(sourceLangSel, 'en');
  populateSelect(targetLangSel, 'es');

  sourceText.addEventListener('input', () => {
    charCount.textContent = sourceText.value.length;
  });

  swapBtn.addEventListener('click', () => {
    const s = sourceLangSel.value;
    const t = targetLangSel.value;
    sourceLangSel.value = t;
    targetLangSel.value = s;

    // If there's already a translation, swap the text panes too
    const currentOutput = outputText.classList.contains('placeholder') ? '' : outputText.textContent;
    if(currentOutput){
      sourceText.value = currentOutput;
      charCount.textContent = sourceText.value.length;
      setOutput('Your translation will appear here.', true);
    }
  });

  function setStatus(msg, isError){
    statusLine.textContent = msg || '';
    statusLine.classList.toggle('error', !!isError);
  }

  function setOutput(text, isPlaceholder){
    outputText.textContent = text;
    outputText.classList.toggle('placeholder', !!isPlaceholder);
    copyBtn.disabled = !!isPlaceholder;
    speakBtn.disabled = !!isPlaceholder;
  }

  async function translate(){
    const text = sourceText.value.trim();
    if(!text){
      setStatus('Type something to translate first.', true);
      return;
    }

    const from = sourceLangSel.value;
    const to = targetLangSel.value;

    if(from === to){
      setOutput(text, false);
      setStatus('Source and target languages are the same.');
      return;
    }

    translateBtn.disabled = true;
    translateBtn.textContent = 'Translating…';
    setStatus('Contacting translation service…');

    try{
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`;
      const res = await fetch(url);
      if(!res.ok) throw new Error('Network response was not ok');
      const data = await res.json();

      if(data && data.responseData && data.responseData.translatedText){
        setOutput(data.responseData.translatedText, false);
        setStatus('Translated just now.');
      } else {
        throw new Error('No translation returned');
      }
    } catch(err){
      console.error(err);
      setOutput('Your translation will appear here.', true);
      setStatus('Translation failed — check your connection and try again.', true);
    } finally {
      translateBtn.disabled = false;
      translateBtn.textContent = 'Translate';
    }
  }

  translateBtn.addEventListener('click', translate);

  sourceText.addEventListener('keydown', (e) => {
    if((e.metaKey || e.ctrlKey) && e.key === 'Enter'){
      translate();
    }
  });

  copyBtn.addEventListener('click', async () => {
    try{
      await navigator.clipboard.writeText(outputText.textContent);
      const original = copyBtn.textContent;
      copyBtn.textContent = '✓ Copied';
      setTimeout(() => { copyBtn.textContent = original; }, 1500);
    } catch(err){
      setStatus('Could not copy — your browser may be blocking clipboard access.', true);
    }
  });

  speakBtn.addEventListener('click', () => {
    if(!('speechSynthesis' in window)){
      setStatus('Text-to-speech is not supported in this browser.', true);
      return;
    }
    const utter = new SpeechSynthesisUtterance(outputText.textContent);
    utter.lang = targetLangSel.value;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utter);
  });
</script>

</body>
</html>
